name: Build and Push to prod

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-push-prod:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Publish dist to prod branch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p /tmp/prod-branch
          cp -R dist/. /tmp/prod-branch/

          git switch --orphan prod-deploy-${GITHUB_RUN_ID}
          git rm -rf . || true
          cp -R /tmp/prod-branch/. .

          touch .nojekyll

          git add -A
          git commit -m "Deploy from ${GITHUB_SHA}" || echo "No changes to commit"
          git push origin HEAD:prod --force
