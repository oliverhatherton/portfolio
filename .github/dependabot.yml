version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "07:00"
      timezone: "UTC"
    target-branch: "main"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "07:15"
      timezone: "UTC"
    target-branch: "main"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
